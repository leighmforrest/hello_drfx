server {
    listen 80;
    server_name 45.79.141.158;

    # Serve frontend build
    root <PROJECT_DIRECTORY>/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://unix:/run/hello.sock;  # Change if your backend runs elsewhere
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://unix:/run/hello.sock;  # Change if your backend runs elsewhere
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve backend static files
     location /static/ {
         alias <PROJECT_DIRECTORY>/backend/staticfiles/;
         expires 1y;
         access_log off;
         add_header Cache-Control "public, max-age=31536000, immutable";
     }
}
