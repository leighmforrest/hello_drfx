name: Hello
on: [push]
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: push repo via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          source: "."
          target: ${{ secrets.APP_DIRECTORY }}
      - name: build current frontend via ssh
        uses: appleboy/ssh-action@v0.1.7
        with:
              host: ${{ secrets.SERVER_IP }}
              username: ${{ secrets.USERNAME }}
              key: ${{ secrets.PRIVATE_KEY }}
              port: 22
              script: | 
                cd ${{ secrets.APP_DIRECTORY }}/frontend
                echo ${{ secrets.SUDO_PASSWORD }} | sudo -S npm install
                echo ${{ secrets.SUDO_PASSWORD }} | sudo -S npm run build
      - name: run backend update via ssh
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: | 
            cd ${{ secrets.APP_DIRECTORY }}/backend
            echo ${{ secrets.SUDO_PASSWORD }} | sudo -S source .venv/bin/activate
            echo ${{ secrets.SUDO_PASSWORD }} | sudo -S pip install -r requirements.txt
            echo ${{ secrets.SUDO_PASSWORD }} | sudo -S ./manage.py collectstatic --noinput